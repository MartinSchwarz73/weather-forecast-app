<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <title>Weather App</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div id="skyBackground"></div>

  <!-- Hlavní obsah -->
  <div id="mainContainer">
    <h1>Předpověď počasí</h1>

    <!-- Domeček -->
    <div id="houseWithCharacters">
      <img src="/images/house-200px.png" alt="Domeček">
    </div>

    <!-- wrapper pro input + suggestions -->
    <div class="input-wrapper">
      <input type="text" id="city" autocomplete="off" placeholder="Zadejte město">
      <div id="suggestions"></div>
    </div>

    <!-- Forecast tabulka -->
    <div id="forecastContainer">
      <div id="forecast"></div>
    </div>
  </div>

  <div id="chartModal" class="modal">
    <div class="modal-content">
      <canvas id="dayChart"></canvas>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>

</html>
