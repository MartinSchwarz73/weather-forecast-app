<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <title>Weather App</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div id="skyBackground"></div>

  <!-- The main container -->
  <div id="mainContainer">
    
    <!-- House with characters -->
    <div id="houseWithCharacters">
      <img src="/images/house-400px.png" alt="Domeček">
    </div>

    <!-- wrapper pro input + suggestions -->
    <div class="input-wrapper">
      <h1>Předpověď počasí pro</h1>
      <input type="text" id="city" autocomplete="off" placeholder="Zadejte město">
      <div id="suggestions"></div>
    </div>

    <!-- Forecast container -->
    <div id="forecastContainer">
      <div id="forecast"></div>
    </div>
  </div>

  <!-- modal window for chart -->
  <div id="chartModal" class="modal">
    <div class="modal-content">
      <canvas id="dayChart"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="js/main.js"></script>
</body>

</html>
